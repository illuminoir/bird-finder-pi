<style>
    .feed-scroll {
        max-height: 280px;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
    }

    .feed-scroll::-webkit-scrollbar { width: 4px; }
    .feed-scroll::-webkit-scrollbar-track { background: transparent; }
    .feed-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .feed-scroll:hover::-webkit-scrollbar-thumb { background: var(--muted); }

    .feed-species-wrap {
        position: relative;
    }

    .feed-popup {
        display: none;
        position: absolute;
        left: 0;
        top: calc(100% + 6px);
        z-index: 100;
        background: #0d1a0e;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 8px 12px;
        min-width: 200px;
        white-space: nowrap;
        pointer-events: none;
    }

    .feed-species-wrap:hover .feed-popup {
        display: block;
    }

    .popup-title {
        font-style: italic;
        color: var(--text);
        margin-bottom: 6px;
        font-size: 12px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 5px;
    }

    .popup-row {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text-dim);
        font-size: 11px;
        padding: 3px 0;
        font-family: 'DM Mono', monospace;
    }

    .popup-row::before {
        content: "°";
        color: var(--muted);
        flex-shrink: 0;
    }

    .popup-conf { color: var(--amber); min-width: 44px; }
    .popup-time { color: var(--text-dim); }
</style>

<div class="feed-scroll">
    <ul class="feed">
        {% for r in recent %}
        <li class="feed-item">
            <div class="feed-species-wrap">
                <span class="feed-species">{{ r.species }}</span>
                <div class="feed-popup">
                    <div class="popup-title">{{ r.species }}</div>
                    {% for d in r.all_detections %}
                    <div class="popup-row">
                        <span class="popup-conf">{{ d.confidence }}%</span>
                        <span class="popup-time">{{ d.time_ago }}</span>
                    </div>
                    {% endfor %}
                </div>
            </div>
            <span class="feed-meta">{{ r.time_ago }}</span>
        </li>
        {% else %}
        <li class="empty">No detections for this period.</li>
        {% endfor %}
    </ul>
</div>
