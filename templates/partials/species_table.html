{% if stats %}
{% set max_count = stats[0].count %}

<div class="feed-scroll">
    <table class="species-table">
        <thead>
            <tr>
                <th>Species</th>
                <th>Detections</th>
                <th>Last Seen</th>
            </tr>
        </thead>
        <tbody>
            {% for s in stats %}
            <tr>
                <td>
                    <div class="feed-species-wrap"
                         data-popup="<div class='popup-title'>{{ s.species }}</div><div class='popup-row'><span class='popup-conf'>{{ s.count }} detection{{ 's' if s.count != 1 else '' }}</span><span class='popup-time'>{{ s.last_seen }}</span></div>">
                        <span class="species-name" data-species-click="{{ s.species }}" style="cursor:pointer">{{ s.species }}</span>
                    </div>
                </td>
                <td>
                    <div class="count-bar-wrap">
                        <div class="count-bar-bg">
                            <div class="count-bar-fill"
                                 style="width: {{ (s.count / max_count * 100)|int }}%">
                            </div>
                        </div>
                        <span class="count-num">{{ s.count }}</span>
                    </div>
                </td>
                <td class="last-seen">{{ s.last_seen }}</td>
                <td class="last-seen">{{ s.rarity }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<div class="empty">No species data yet.</div>
{% endif %}
